<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini WorkSync</title>
<!-- Google Fonts for a premium look -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Tailwind CSS for rapid modern styling -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
        colors: {
          darkBg: '#09090b',
          cardBg: '#18181b',
          cardBorder: '#27272a',
          primary: '#0ea5e9',
          primaryGlow: 'rgba(14, 165, 233, 0.4)',
          success: '#10b981',
          warning: '#f59e0b',
          danger: '#ef4444'
        },
        boxShadow: {
          'neon': '0 0 20px rgba(14, 165, 233, 0.3)',
          'neon-success': '0 0 20px rgba(16, 185, 129, 0.3)',
        }
      }
    }
  }
</script>
<style>
  body {
    background-color: #09090b;
    background-image: 
      radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
      radial-gradient(at 50% 0%, hsla(225,39%,30%,0.1) 0, transparent 50%), 
      radial-gradient(at 100% 0%, hsla(339,49%,30%,0.1) 0, transparent 50%);
    background-attachment: fixed;
    color: #e4e4e7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  /* Custom styling for inputs to make them ultra-sleek */
  input[type="time"] {
    appearance: none;
    background: #27272a;
    border: 1px solid #3f3f46;
    color: #f4f4f5;
  }
  input[type="time"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
    opacity: 0.5;
    cursor: pointer;
  }
  input[type="time"]:focus {
    border-color: #0ea5e9;
    box-shadow: 0 0 0 2px rgba(14,165,233,0.2);
    outline: none;
  }

  /* Range slider styling */
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    background: transparent;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    height: 20px;
    width: 20px;
    border-radius: 50%;
    background: #0ea5e9;
    cursor: pointer;
    margin-top: -8px;
    box-shadow: 0 0 10px rgba(14,165,233,0.5);
  }
  input[type=range]::-webkit-slider-runnable-track {
    width: 100%;
    height: 6px;
    cursor: pointer;
    background: #3f3f46;
    border-radius: 99px;
  }
  
  /* Circular Progress */
  .progress-ring__circle {
    transition: stroke-dashoffset 0.8s ease-in-out, stroke 0.3s;
    transform: rotate(-90deg);
    transform-origin: 50% 50%;
  }

  /* Glass panel effect */
  .glass-panel {
    background: rgba(24, 24, 27, 0.6);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.05);
  }

  .smooth-transition {
    transition: all 0.3s ease;
  }
</style>
</head>
<body class="antialiased selection:bg-primary selection:text-white">

<div class="glass-panel rounded-[2rem] w-full max-w-md shadow-2xl relative overflow-hidden flex flex-col">
  <!-- Glowing background orb -->
  <div class="absolute top-0 left-1/2 -translate-x-1/2 w-64 h-32 bg-primary/20 blur-[60px] pointer-events-none rounded-full" id="bg-glow"></div>

  <div class="p-8 pb-6 z-10">
    <!-- Header -->
    <div class="flex justify-between items-start mb-6">
      <div>
        <h1 class="text-2xl font-bold tracking-tight text-white flex items-center gap-2">
          WorkSync
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </h1>
        <p class="text-sm text-zinc-400 mt-1 font-medium" id="live-date">Loading...</p>
      </div>
      <div class="text-right">
        <div class="text-xl font-bold tabular-nums text-white" id="live-time">--:--:--</div>
      </div>
    </div>

    <!-- Main Circular Visualization -->
    <div class="relative flex justify-center items-center py-4 my-2">
      <svg class="w-56 h-56 drop-shadow-xl" viewBox="0 0 200 200">
        <!-- Background track -->
        <circle cx="100" cy="100" r="90" stroke="#27272a" stroke-width="12" fill="none" />
        <!-- Progress track -->
        <circle 
          id="progress-circle"
          class="progress-ring__circle"
          cx="100" cy="100" r="90" 
          stroke="#0ea5e9" stroke-width="12" fill="none" stroke-linecap="round" 
        />
      </svg>
      
      <!-- Center Content -->
      <div class="absolute flex flex-col items-center text-center mt-2">
        <span class="text-xs uppercase tracking-widest text-zinc-400 font-semibold mb-1">Target Leave</span>
        <div id="target-time" class="text-4xl font-extrabold text-white tracking-tighter drop-shadow-md">--:--</div>
        <div id="status-badge" class="mt-3 px-3 py-1 rounded-full text-xs font-bold bg-zinc-800 text-zinc-300 border border-zinc-700 smooth-transition flex items-center gap-1.5">
          <span class="w-1.5 h-1.5 rounded-full bg-zinc-400" id="status-dot"></span>
          <span id="status-text">Pending</span>
        </div>
      </div>
    </div>

    <!-- Quick Stats Grid -->
    <div class="grid grid-cols-2 gap-3 mt-4 mb-6">
      <div class="bg-cardBorder/50 rounded-xl p-3 border border-zinc-800/50 flex flex-col justify-center">
        <span class="text-[10px] uppercase tracking-wider text-zinc-500 font-bold">Remaining</span>
        <span class="text-xl font-bold text-white mt-0.5 tabular-nums" id="stat-remaining">--h --m</span>
      </div>
      <div class="bg-cardBorder/50 rounded-xl p-3 border border-zinc-800/50 flex flex-col justify-center">
        <span class="text-[10px] uppercase tracking-wider text-zinc-500 font-bold">Time Logged</span>
        <span class="text-xl font-bold text-white mt-0.5 tabular-nums" id="stat-worked">--h --m</span>
      </div>
    </div>

    <!-- Core Inputs -->
    <div class="space-y-4 relative z-10">
      
      <!-- Arrival Time -->
      <div class="relative group">
        <label class="absolute -top-2 left-3 bg-cardBg px-1 text-[10px] font-bold tracking-wider text-primary uppercase z-10">Arrival Time</label>
        <div class="relative flex items-center">
          <svg class="absolute left-3 text-zinc-400 w-5 h-5 pointer-events-none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <input type="time" id="arrival-time" value="09:30" class="w-full rounded-xl pl-10 pr-4 py-3 text-lg font-semibold shadow-inner focus:ring-0 smooth-transition" />
        </div>
      </div>

      <!-- Break Controls -->
      <div class="bg-cardBorder/30 rounded-xl p-4 border border-zinc-800/50">
        <div class="flex justify-between items-center mb-3">
          <label class="text-xs font-bold tracking-wider text-zinc-400 uppercase">Break Duration</label>
          <span class="text-sm font-bold text-white bg-zinc-800 px-2 py-0.5 rounded-md border border-zinc-700" id="break-display">30m</span>
        </div>
        
        <input type="range" id="break-slider" min="0" max="120" step="5" value="30" class="mb-4">
        
        <div class="flex gap-2">
          <button class="break-chip flex-1 py-1.5 rounded-lg text-xs font-semibold bg-zinc-800 text-zinc-300 border border-zinc-700 hover:bg-zinc-700 hover:text-white smooth-transition" data-val="0">None</button>
          <button class="break-chip flex-1 py-1.5 rounded-lg text-xs font-semibold bg-primary text-white border border-primary shadow-[0_0_10px_rgba(14,165,233,0.3)] smooth-transition active" data-val="30">30m</button>
          <button class="break-chip flex-1 py-1.5 rounded-lg text-xs font-semibold bg-zinc-800 text-zinc-300 border border-zinc-700 hover:bg-zinc-700 hover:text-white smooth-transition" data-val="60">1h</button>
        </div>
      </div>
      
      <!-- Accordion for Standard Shift Settings -->
      <details class="group bg-cardBorder/30 rounded-xl border border-zinc-800/50 overflow-hidden">
        <summary class="flex justify-between items-center font-medium cursor-pointer list-none p-4 text-sm text-zinc-300 hover:text-white smooth-transition">
          <div class="flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            Shift Rules
          </div>
          <span class="transition group-open:rotate-180">
            <svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="20"><polyline points="6 9 12 15 18 9"/></svg>
          </span>
        </summary>
        <div class="p-4 pt-0 text-zinc-400 group-open:animate-fadeIn grid grid-cols-2 gap-3">
          <div>
            <label class="text-[10px] font-bold uppercase tracking-wider mb-1 block">Start Time</label>
            <input type="time" id="shift-start" value="09:30" class="w-full rounded-lg px-3 py-2 text-sm" />
          </div>
          <div>
            <label class="text-[10px] font-bold uppercase tracking-wider mb-1 block">End Time</label>
            <input type="time" id="shift-end" value="19:00" class="w-full rounded-lg px-3 py-2 text-sm" />
          </div>
        </div>
      </details>

      <!-- Late Warning Alert (Hidden by default) -->
      <div id="alert-late" class="hidden items-center p-3 rounded-xl bg-warning/10 border border-warning/20 text-warning text-xs font-semibold">
        <svg class="w-4 h-4 mr-2 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span id="alert-late-text">Late arrival detected. Logout time adjusted.</span>
      </div>

    </div>
  </div>
</div>

<script>
  // Elements
  const elTime = document.getElementById('live-time');
  const elDate = document.getElementById('live-date');
  const elArrival = document.getElementById('arrival-time');
  const elStart = document.getElementById('shift-start');
  const elEnd = document.getElementById('shift-end');
  const elBreakSlider = document.getElementById('break-slider');
  const elBreakDisplay = document.getElementById('break-display');
  const breakChips = document.querySelectorAll('.break-chip');
  const elTargetTime = document.getElementById('target-time');
  const elRemaining = document.getElementById('stat-remaining');
  const elWorked = document.getElementById('stat-worked');
  const elProgress = document.getElementById('progress-circle');
  const elStatusBadge = document.getElementById('status-badge');
  const elStatusText = document.getElementById('status-text');
  const elStatusDot = document.getElementById('status-dot');
  const elGlow = document.getElementById('bg-glow');
  const elAlertLate = document.getElementById('alert-late');
  const elAlertLateText = document.getElementById('alert-late-text');

  // SVG Circle Logic
  const radius = elProgress.r.baseVal.value;
  const circumference = radius * 2 * Math.PI;
  elProgress.style.strokeDasharray = `${circumference} ${circumference}`;

  // Helper Functions
  function timeToMins(timeStr) {
    if (!timeStr) return 0;
    const [h, m] = timeStr.split(':').map(Number);
    return h * 60 + m;
  }

  function minsToTimeStr(mins) {
    const totalMins = ((mins % 1440) + 1440) % 1440;
    const h = Math.floor(totalMins / 60);
    const m = Math.floor(totalMins % 60);
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 || 12;
    return `${h12}:${m.toString().padStart(2, '0')} ${ampm}`;
  }

  function formatDuration(mins) {
    if (mins <= 0) return '0m';
    const h = Math.floor(mins / 60);
    const m = Math.floor(mins % 60);
    if (h === 0) return `${m}m`;
    if (m === 0) return `${h}h`;
    return `${h}h ${m}m`;
  }

  function getNowMins() {
    const now = new Date();
    return now.getHours() * 60 + now.getMinutes();
  }

  // Core Calculator
  function calculate() {
    if (!elArrival.value) return;

    const arrivalMins = timeToMins(elArrival.value);
    const startMins = timeToMins(elStart.value);
    const endMins = timeToMins(elEnd.value);
    const breakMins = parseInt(elBreakSlider.value) || 0;
    const nowMins = getNowMins();

    const shiftDuration = endMins - startMins;
    
    // Calculate lateness and adjust target leave time
    const lateBy = Math.max(0, arrivalMins - startMins);
    const requiredLeaveMins = endMins + lateBy; 
    
    // Stats calculation
    const totalRequiredWorkTime = requiredLeaveMins - arrivalMins; // total span
    let timeLoggedRaw = nowMins - arrivalMins - breakMins;
    if (timeLoggedRaw < 0) timeLoggedRaw = 0; // if break is larger than time logged
    
    const timeRemaining = Math.max(0, requiredLeaveMins - nowMins);
    const progressPercent = Math.min(100, Math.max(0, ((nowMins - arrivalMins) / totalRequiredWorkTime) * 100));

    // Update DOM
    elTargetTime.innerText = minsToTimeStr(requiredLeaveMins);
    elWorked.innerText = formatDuration(timeLoggedRaw);
    
    // Lateness Alert
    if (lateBy > 0) {
      elAlertLate.classList.remove('hidden');
      elAlertLate.classList.add('flex');
      elAlertLateText.innerText = `Arrived ${formatDuration(lateBy)} late. Target extended to ${minsToTimeStr(requiredLeaveMins)}.`;
    } else {
      elAlertLate.classList.add('hidden');
      elAlertLate.classList.remove('flex');
    }

    // Save current settings to LocalStorage
    saveSettings();

    // Status logic (Colors & Text)
    if (nowMins >= requiredLeaveMins) {
      // Overtime / Done
      const overtime = nowMins - requiredLeaveMins;
      elRemaining.innerText = `+${formatDuration(overtime)}`;
      elRemaining.classList.add('text-success');
      
      updateStatusUI('success', 'Ready to Leave', '#10b981');
      setProgress(100, '#10b981');
    } else if (timeRemaining <= 30) {
      // Warning / Closing in
      elRemaining.innerText = formatDuration(timeRemaining);
      elRemaining.classList.remove('text-success');
      
      updateStatusUI('warning', 'Wrapping Up', '#f59e0b');
      setProgress(progressPercent, '#f59e0b');
    } else {
      // Standard working
      elRemaining.innerText = formatDuration(timeRemaining);
      elRemaining.classList.remove('text-success');
      
      updateStatusUI('primary', 'In Progress', '#0ea5e9');
      setProgress(progressPercent, '#0ea5e9');
    }
  }

  function setProgress(percent, color) {
    const offset = circumference - (percent / 100) * circumference;
    elProgress.style.strokeDashoffset = offset;
    elProgress.style.stroke = color;
  }

  function updateStatusUI(theme, text, hex) {
    // Reset classes
    elStatusBadge.className = `mt-3 px-3 py-1 rounded-full text-xs font-bold border smooth-transition flex items-center gap-1.5`;
    
    if(theme === 'success') {
      elStatusBadge.classList.add('bg-success/10', 'text-success', 'border-success/20');
      elStatusDot.style.backgroundColor = hex;
      elStatusDot.classList.add('animate-pulse');
      elGlow.style.backgroundColor = 'rgba(16, 185, 129, 0.2)';
    } else if (theme === 'warning') {
      elStatusBadge.classList.add('bg-warning/10', 'text-warning', 'border-warning/20');
      elStatusDot.style.backgroundColor = hex;
      elStatusDot.classList.remove('animate-pulse');
      elGlow.style.backgroundColor = 'rgba(245, 158, 11, 0.15)';
    } else {
      elStatusBadge.classList.add('bg-primary/10', 'text-primary', 'border-primary/20');
      elStatusDot.style.backgroundColor = hex;
      elStatusDot.classList.remove('animate-pulse');
      elGlow.style.backgroundColor = 'rgba(14, 165, 233, 0.2)';
    }
    elStatusText.innerText = text;
  }

  // Local Storage persistence
  function saveSettings() {
    localStorage.setItem('ws_arrival', elArrival.value);
    localStorage.setItem('ws_start', elStart.value);
    localStorage.setItem('ws_end', elEnd.value);
    localStorage.setItem('ws_break', elBreakSlider.value);
  }

  function loadSettings() {
    const savedArrival = localStorage.getItem('ws_arrival');
    const savedStart = localStorage.getItem('ws_start');
    const savedEnd = localStorage.getItem('ws_end');
    const savedBreak = localStorage.getItem('ws_break');

    if (savedArrival) elArrival.value = savedArrival;
    if (savedStart) elStart.value = savedStart;
    if (savedEnd) elEnd.value = savedEnd;
    if (savedBreak) {
      elBreakSlider.value = savedBreak;
      // Trigger input event to update the UI chips and break display
      elBreakSlider.dispatchEvent(new Event('input'));
    }
  }

  // Live Clocks
  function initClocks() {
    setInterval(() => {
      const now = new Date();
      // Time format
      const h = now.getHours() % 12 || 12;
      const m = now.getMinutes().toString().padStart(2, '0');
      const s = now.getSeconds().toString().padStart(2, '0');
      const ampm = now.getHours() >= 12 ? 'PM' : 'AM';
      elTime.innerHTML = `${h}:${m}<span class="text-zinc-500 text-base font-medium">:${s} ${ampm}</span>`;
      
      // Date format
      const options = { weekday: 'long', month: 'short', day: 'numeric' };
      elDate.innerText = now.toLocaleDateString('en-US', options);

      // Re-calculate progress every minute
      if(now.getSeconds() === 0) calculate();
    }, 1000);
  }

  // Event Listeners
  [elArrival, elStart, elEnd, elBreakSlider].forEach(el => {
    el.addEventListener('input', calculate);
  });

  // Break Slider & Chips Sync
  elBreakSlider.addEventListener('input', (e) => {
    const val = e.target.value;
    elBreakDisplay.innerText = val > 0 ? (val >= 60 ? (val % 60 === 0 ? `${val/60}h` : `${Math.floor(val/60)}h ${val%60}m`) : `${val}m`) : 'None';
    
    // Sync chips
    breakChips.forEach(chip => {
      if(chip.dataset.val === val) {
        chip.className = 'break-chip flex-1 py-1.5 rounded-lg text-xs font-semibold bg-primary text-white border border-primary shadow-[0_0_10px_rgba(14,165,233,0.3)] smooth-transition active';
      } else {
        chip.className = 'break-chip flex-1 py-1.5 rounded-lg text-xs font-semibold bg-zinc-800 text-zinc-300 border border-zinc-700 hover:bg-zinc-700 hover:text-white smooth-transition';
      }
    });
  });

  breakChips.forEach(chip => {
    chip.addEventListener('click', (e) => {
      elBreakSlider.value = e.target.dataset.val;
      // Trigger slider input event to run sync and calculate
      elBreakSlider.dispatchEvent(new Event('input')); 
    });
  });

  // Boot
  initClocks();

  // Load saved settings
  loadSettings();

  // Call immediately to set initial time
  const initTime = new Date();
  elTime.innerHTML = `${initTime.getHours() % 12 || 12}:${initTime.getMinutes().toString().padStart(2, '0')}<span class="text-zinc-500 text-base font-medium">:${initTime.getSeconds().toString().padStart(2, '0')} ${initTime.getHours() >= 12 ? 'PM' : 'AM'}</span>`;
  elDate.innerText = initTime.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
  
  // Set initial animations
  setTimeout(calculate, 100);

</script>
</body>
</html>
